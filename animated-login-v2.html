<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopKart - Sign In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8dccb 0%, #d4c4b0 100%);
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #8B6B47 0%, #a67c52 100%);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 350px;
      height: 350px;
      background: linear-gradient(135deg, #d4a574 0%, #c9956e 100%);
      bottom: -80px;
      right: -80px;
      animation-delay: 3s;
      animation-duration: 25s;
    }

    .blob-3 {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, #8B6B47 0%, #6b5438 100%);
      top: 50%;
      right: -50px;
      animation-delay: 6s;
      animation-duration: 22s;
    }

    .blob-4 {
      width: 280px;
      height: 280px;
      background: linear-gradient(135deg, #b8956d 0%, #a67c52 100%);
      bottom: 20%;
      left: 10%;
      animation-delay: 9s;
      animation-duration: 28s;
    }

    .blob-5 {
      width: 320px;
      height: 320px;
      background: linear-gradient(135deg, #d4a574 0%, #8B6B47 100%);
      top: 20%;
      left: 30%;
      animation-delay: 12s;
      animation-duration: 24s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      25% {
        transform: translate(30px, -30px) scale(1.1);
      }
      50% {
        transform: translate(-20px, 20px) scale(0.9);
      }
      75% {
        transform: translate(20px, 30px) scale(1.05);
      }
    }

    /* Login Container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Login Card */
    .login-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 8px 32px rgba(139, 107, 71, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: cardFloat 6s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: #8B6B47;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .logo-icon {
      display: inline-block;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #8B6B47 0%, #6b5438 100%);
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 12px rgba(139, 107, 71, 0.3);
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h2 {
      font-size: 28px;
      font-weight: 600;
      color: #3d2f1f;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: #6b5438;
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Input Group */
    .input-group {
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #3d2f1f;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: #8B6B47;
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 2px solid rgba(139, 107, 71, 0.2);
      border-radius: 12px;
      font-size: 15px;
      color: #3d2f1f;
      background: rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease;
      outline: none;
    }

    .input-group input:focus {
      border-color: #8B6B47;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 0 4px rgba(139, 107, 71, 0.1);
    }

    .input-group input:focus + .input-icon {
      color: #6b5438;
    }

    /* Password Toggle */
    .password-toggle {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      color: #8B6B47;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #6b5438;
    }

    /* Forgot Password */
    .forgot-password {
      text-align: right;
      margin-top: -8px;
    }

    .forgot-password a {
      font-size: 13px;
      color: #8B6B47;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #6b5438;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8B6B47 0%, #6b5438 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(139, 107, 71, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(139, 107, 71, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-google {
      background: white;
      color: #3d2f1f;
      border: 2px solid rgba(139, 107, 71, 0.2);
      margin-top: 12px;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: #8B6B47;
      transform: translateY(-2px);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(139, 107, 71, 0.2);
    }

    .divider span {
      font-size: 13px;
      color: #6b5438;
      font-weight: 500;
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #6b5438;
    }

    .login-footer a {
      color: #8B6B47;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .login-footer a:hover {
      color: #6b5438;
    }

    /* Loading State */
    .btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 16px;
      }

      .login-card {
        padding: 32px 24px;
      }

      .login-header h2 {
        font-size: 24px;
      }

      .logo h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">🛒</div>
        <h1>LoopKart</h1>
      </div>

      <!-- Header -->
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Sign in to continue shopping</p>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="loginForm">
        <!-- Email Input -->
        <div class="input-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div>
        </div>

        <!-- Password Input -->
        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" id="togglePassword">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <!-- Forgot Password -->
        <div class="forgot-password">
          <a href="#" onclick="alert('Password reset feature coming soon!'); return false;">Forgot password?</a>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="btn btn-primary" id="signInBtn">
          <span id="btnText">Sign In</span>
        </button>

        <!-- Divider -->
        <div class="divider">
          <span>or continue with</span>
        </div>

        <!-- Google Sign In -->
        <button type="button" class="btn btn-google" onclick="alert('Google Sign-In coming soon!')">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        Don't have an account? <a href="#" onclick="alert('Registration page coming soon!'); return false;">Create account</a>
      </div>
    </div>
  </div>

  <script>
    // Password Toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      
      // Change icon
      if (type === 'text') {
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    });

    // Form Submit
    const loginForm = document.getElementById('loginForm');
    const signInBtn = document.getElementById('signInBtn');
    const btnText = document.getElementById('btnText');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Validation
      if (!email || !password) {
        alert('Please fill in all fields');
        return;
      }

      // Show loading state
      signInBtn.classList.add('loading');
      btnText.innerHTML = '<div class="spinner"></div>';

      // Simulate login (replace with actual API call)
      setTimeout(() => {
        signInBtn.classList.remove('loading');
        btnText.textContent = 'Sign In';
        alert(`Login successful!\nEmail: ${email}\n\nNote: This is a frontend-only demo. No actual authentication is performed.`);
        loginForm.reset();
      }, 2000);
    });

    // Input animations
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.transform = 'scale(1.01)';
      });
      
      input.addEventListener('blur', () => {
        input.parentElement.style.transform = 'scale(1)';
      });
    });
  </script>
</body>
</html>
